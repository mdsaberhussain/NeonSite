<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - NeonSite</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <div class="container">
      <div class="logo">Neon<span>Site</span></div>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </div>
  </nav>

  <section class="content-section">
    <div class="container">
      <h2 class="gradient-text">Let's Connect</h2>
      <p class="subtitle">Ready to start your next big project? Drop us a line.</p>
      
      <form class="contact-form">
        <div class="input-group">
          <input type="text" placeholder="Your Name" required>
        </div>
        <div class="input-group">
          <input type="email" placeholder="Email Address" required>
        </div>
        <div class="input-group">
          <textarea placeholder="Tell us about your vision..." rows="5" required></textarea>
        </div>
        <button type="submit" class="btn-primary">Send Message</button>
      </form>
    </div>
  </section>
</body>
</html>
